<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payoo|Home</title>
    <link rel="shortcut icon" href="assets/logo.png">

    <!-- Tailwind CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- DaisyUI CDN -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />

    <!-- font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&
        family=Manrope:wght@200..800&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Outfit:wght@100..900&
        family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;
        1,600;1,700;1,800;1,900&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <style>
        * {
            font-family: "Outfit", sans-serif;
        }
    </style>

    <!-- font-awesome(icons) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>

<body class="min-h-screen max-w-md mx-auto bg-base-200">

    <header class="border-b-1 border-gray-300 pt-15 sticky top-0 bg-base-200 z-10">

        <div class="w-11/12 mx-auto py-3 flex justify-between items-center">

            <div class="left flex gap-1">

                <div class="w-[60px]">
                    <img src="assets/logo.png" alt="">
                </div>

                <div>
                    <h2 class="font-bold text-[20px]">
                        $<span id="balance">45000</span>
                    </h2>
                    <p class="text-neutral/50">Available Balance</p>
                </div>

            </div>

            <div class="right">
                <a href="/index.html" class="btn btn-soft"><i class="fa-solid fa-arrow-right-from-bracket"></i>Log
                    Out</a>
            </div>

        </div>

    </header>

    <section class="w-11/12 mx-auto py-10 space-y-2">

        <h2 class="font-bold text-[30px]">
            Welcome to Pay<span class="text-purple-700">oo</span>
        </h2>
        <p class="text-neutral/50 ">Enjoy easy and convinient financial service with us.Cashout charge is low.</p>

        <div class="grid grid-cols-3 mt-10 gap-4">

            <button class="btn flex-col h-full py-4 btn-soft">

                <img src="assets/opt-1.png" alt="">
                <p>Add Money</p>

            </button>
            <button class="btn flex-col h-full py-4 btn-soft">

                <img src="assets/opt-2.png" alt="">
                <p>Cashout</p>

            </button>
            <button class="btn flex-col h-full py-4 btn-soft">

                <img src="assets/opt-3.png" alt="">
                <p>Transfer Money</p>

            </button>

            <button class="btn flex-col h-full py-4 btn-soft">

                <img src="assets/opt-4.png" alt="">
                <p>Get Bonus</p>

            </button>

            <button class="btn flex-col h-full py-4 btn-soft">

                <img src="assets/opt-5.png" alt="">
                <p>Pay Bill</p>

            </button>

            <button class="btn flex-col h-full py-4 btn-soft">

                <img src="assets/opt-6.png" alt="">
                <p>Transactions</p>

            </button>

        </div>

    </section>

    <section id="cashout" class="w-11/12 mx-auto py-5">

        <h2 class="text-xl font-bold mb-5">Cashout</h2>

        <div class=" card bg-base-100 w-full shadow rounded-md">

            <div class="card-body">

                <fieldset class="fieldset">

                    <!-- Cashout Section -->

                    <label class="label font-bold text-gray-500 text-[15px]">Agent Number</label>
                    <input id="agent-number" maxlength="11" minlength="11" type="number"
                        class="input rounded-full w-full" placeholder="Enter 11 digit Number" />

                    <label class="label font-bold text-gray-500 text-[15px]">Amount</label>
                    <input id="cashout-amount" type="number" class="input rounded-full w-full"
                        placeholder="Enter Amount to withdraw" />

                    <label class="label font-bold text-gray-500 text-[15px]">Pin Number</label>
                    <input id="password-input" type="password" class="input rounded-full w-full"
                        placeholder="Enter 4 digit pin number" />

                    <button id="cashout-btn" class="btn btn-primary mt-4 rounded-full">
                        Withdraw Money
                    </button>
                    
                </fieldset>

            </div>

    </section>

    <script src="script/cashout.js"></script>
</body>

</html>
