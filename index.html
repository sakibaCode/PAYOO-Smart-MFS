<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payoo|Login</title>
    <link rel="shortcut icon" href="assets/logo.png">

    <!-- Tailwind CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- DaisyUI CDN -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />

    <!-- font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&
        family=Manrope:wght@200..800&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Outfit:wght@100..900&
        family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;
        1,600;1,700;1,800;1,900&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <style>
        * {
            font-family: "Outfit", sans-serif;
        }
    </style>

    <!-- font-awesome(icons) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>

<body class="min-h-screen max-w-md mx-auto bg-base-200">

    <section class="login">
        <div class="logo w-[200px] mx-auto pt-45">
            <img src="assets/Logo-full.png" alt="">
        </div>

        
        <div class="form pt-10">
            <div class="bg-base-100 w-full max-w-sm mx-auto mt-10  shrink-0 shadow rounded-md">
            <div class="card-body">
                <fieldset class="fieldset">
                    <label class="label font-bold text-black text-[15px]">Mobile Number</label>
                    <input id="number-input" type="number" class="input rounded-full" placeholder="Enter Your Mobile Number" />
                    <label class="label font-bold text-black text-[15px]">4 Digit Pin</label>
                    <input id="password-input" type="password" class="input rounded-full" placeholder="Password" />
                    <button id="login-btn" class="btn btn-primary mt-4 rounded-full">Login</button>
                </fieldset>
            </div>
        </div>
        

    </section>

    <script src="script/login.js"></script>
</body>

</html>
